<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 — AI驱动的开源游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- 头部 -->
        <div class="header">
            <div class="title">2048</div>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最大数字</div>
                    <div class="score-value" id="best">0</div>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="btn-group">
            <button class="btn" onclick="window.game.newGame()">🔄 新游戏</button>
            <button class="btn btn-undo" onclick="window.game.undoMove(); renderBoard();">↩ 撤销</button>
        </div>

        <!-- 棋盘大小选择 -->
        <div class="size-selector">
            <button class="size-btn" id="size-3" onclick="window.game.setBoardSize(3); renderBoard();">3×3</button>
            <button class="size-btn active" id="size-4" onclick="window.game.setBoardSize(4); renderBoard();">4×4</button>
            <button class="size-btn" id="size-5" onclick="window.game.setBoardSize(5); renderBoard();">5×5</button>
        </div>

        <!-- 棋盘 -->
        <div class="board" id="board">
            <div class="message" id="message"></div>
        </div>

        <!-- 操作说明 -->
        <div class="instructions">
            <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动 &nbsp;|&nbsp;
            <kbd>Ctrl</kbd>+<kbd>Z</kbd> 撤销 &nbsp;|&nbsp;
            触屏滑动可用 &nbsp;|&nbsp;
            合并数字到达 <strong>2048</strong>！
        </div>

    </div>

    <!-- JS 模块（按顺序加载） -->
    <script src="src/game.js"></script>
    <script src="src/render.js"></script>
    <script src="src/input.js"></script>

    <!-- 启动游戏 -->
    <script>
        window.game.initBoard(4);
        renderBoard();
        window.game.updateScoreDisplay();
    </script>
</body>
</html>
