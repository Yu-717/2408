name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  # 支持手动触发部署
  workflow_dispatch:

# 确保只有一个 deploy 在运行；正在部署时新 push 会取消前一个
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # 授予 GitHub Pages 部署权限
    permissions:
      contents: read
      pages: write
      id-token: write

    # 部署到 GitHub Pages 环境
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks (lint + test + coverage)
        run: |
          npm run lint
          npm test
          npm run test:coverage

      - name: Generate AI review report
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE_URL: ${{ secrets.AI_API_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: |
          npm run ai:tests || true
          npm run ai:review || true

      # ─────────── 准备部署产物 ───────────
      - name: Prepare deploy artifact
        shell: bash
        run: |
          mkdir -p _deploy
          cp -r index.html style.css src/ _deploy/
          # 也复制 docs/ 到 _deploy 便于浏览文档
          cp -r docs/ _deploy/docs/
          # 写入部署时间戳
          echo "Deployed at $(date -u '+%Y-%m-%d %H:%M UTC')" > _deploy/_deploy_info.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4